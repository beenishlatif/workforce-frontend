<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorkTrack Pro</title>
    <!--
      ❌ REMOVED: <script src="https://cdn.tailwindcss.com">
         Reason: Violates Content-Security-Policy (script-src-elem)
         and crashes with "tailwind is not defined" at runtime.
         Tailwind is bundled via PostCSS/Vite — the CDN is not needed.

      ✅ The tailwind.config customizations (primary color etc.) belong
         in tailwind.config.js at the project root, not here.
    -->
    <style>
      /* ── Base resets (previously inline + Tailwind CDN config) ── */
      html,
      body {
        margin: 0;
        padding: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial,
          sans-serif;
        background-color: #f9fafb;
        overflow-x: hidden;
      }

      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* Better image responsiveness globally */
      img,
      video {
        max-width: 100%;
        height: auto;
        display: block;
      }

      /* Table safety for mobile */
      table {
        width: 100%;
        border-collapse: collapse;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
